<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Dynamics by Category</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
@font-face{font-family:'YS Text';font-weight:400;src:url('https://yastatic.net/s3/home/fonts/ys/text/3.0/regular.woff2') format('woff2')}
@font-face{font-family:'YS Text';font-weight:500;src:url('https://yastatic.net/s3/home/fonts/ys/text/3.0/medium.woff2') format('woff2')}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --font:'YS Text',-apple-system,sans-serif;
  --bg:#f2f3f5;
  --surface:#fff;
  --border:rgba(0,0,0,.1);
  --text:rgba(0,0,0,.85);
}
html{font-size:13px}
body{font-family:var(--font);color:var(--text);background:var(--bg);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:32px}

.card{
  background:var(--surface);border-radius:8px;
  padding:20px 24px;width:100%;max-width:800px;height:420px;
  display:flex;flex-direction:column;
  box-shadow:0 1px 4px rgba(0,0,0,.06);
}
.card-title{font-size:15px;font-weight:400;margin-bottom:12px;color:var(--text)}

/* Legend */
.legend{display:flex;gap:20px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.legend-item{
  display:flex;align-items:center;gap:8px;font-size:13px;line-height:18px;
  color:rgba(0,0,0,.5);cursor:pointer;position:relative;
}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}



/* Compare Hint */
.compare-hint{
  position:absolute;bottom:calc(100% + 12px);
  width:282px;background:#fff;border:1px solid rgba(0,0,0,.1);border-radius:5px;
  padding:16px;z-index:200;
  box-shadow:0 4px 16px rgba(0,0,0,.08);
  opacity:0;pointer-events:none;transition:opacity .2s;
}
.compare-hint.visible{opacity:1;pointer-events:auto}
.compare-hint::after{
  content:'';position:absolute;bottom:-8px;left:var(--arrow-left,50%);transform:translateX(-50%);
  width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;
  border-top:8px solid #fff;
}
.compare-hint::before{
  content:'';position:absolute;bottom:-9px;left:var(--arrow-left,50%);transform:translateX(-50%);
  width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
  border-top:9px solid rgba(0,0,0,.1);
}
.compare-hint__title{font-size:17px;line-height:24px;font-weight:500;color:rgba(0,0,0,.85);margin-bottom:12px}
.compare-hint__desc{font-size:13px;line-height:18px;font-weight:400;color:rgba(0,0,0,.85);margin-bottom:16px}
.compare-hint__btn{
  display:flex;align-items:center;justify-content:center;width:100%;
  height:28px;padding:0;border:none;border-radius:6px;
  background:rgba(0,0,0,.05);font-size:13px;line-height:18px;font-weight:400;
  font-family:var(--font);color:rgba(0,0,0,.85);cursor:pointer;
}
.compare-hint__btn:hover{background:rgba(0,0,0,.08)}
</style>
</head>
<body>

<div class="card">
  <div class="card-title">Sales Dynamics by Category</div>
  <div style="position:relative;width:100%;flex:1;min-height:0">
    <canvas id="areaChart"></canvas>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background-color:#3D97F2"></div>Central</div>
    <div class="legend-item"><div class="legend-dot" style="background-color:#FF6A59"></div>East</div>
    <div class="legend-item"><div class="legend-dot" style="background-color:#7FD169"></div>South</div>
    <div class="legend-item"><div class="legend-dot" style="background-color:#FFB433"></div>West</div>
  </div>
</div>

<script>
const fontFamily='YS Text';
Chart.defaults.animation = false;
Chart.defaults.transitions.active = {animation: {duration: 0}};
const gridColor='#f0f1f3';
const tickColor='rgba(0,0,0,0.5)';
const tickFont={size:11,family:'Lucida Grande',lineHeight:13/11,weight:'400'};

const areaLabels=["Jan '15","Feb","Mar","Apr","May '15","Jun","Jul","Aug","Sep '15","Oct","Nov","Dec",
  "Jan '16","Feb","Mar","Apr","May '16","Jun","Jul","Aug","Sep '16","Oct","Nov","Dec",
  "Jan '17","Feb","Mar","Apr","May '17","Jun","Jul","Aug","Sep '17"];

const central=[18000,12000,22000,9000,15000,25000,11000,19000,8000,27000,14000,20000,16000,10000,24000,13000,21000,7000,26000,15000,9000,23000,17000,11000,20000,14000,28000,10000,18000,22000,13000,25000,16000];
const east=[14000,8000,19000,22000,10000,16000,6000,21000,13000,9000,24000,11000,17000,20000,7000,15000,23000,12000,8000,18000,25000,10000,14000,21000,9000,16000,12000,26000,15000,8000,20000,11000,17000];
const south=[7000,12000,5000,15000,9000,4000,11000,8000,14000,6000,10000,16000,5000,13000,8000,11000,6000,15000,9000,4000,12000,7000,14000,10000,5000,13000,8000,11000,16000,6000,9000,14000,7000];
const west=[10000,16000,8000,13000,20000,6000,17000,11000,15000,22000,9000,14000,7000,18000,12000,21000,8000,16000,10000,13000,19000,7000,15000,11000,22000,9000,17000,13000,6000,20000,14000,10000,18000];

new Chart(document.getElementById('areaChart'),{
  type:'line',
  data:{
    labels:areaLabels,
    datasets:[
      {label:'Central',data:central,backgroundColor:'rgba(61,151,242,.75)',borderColor:'#3D97F2',borderWidth:1.5,fill:'origin',tension:0,pointRadius:0,pointHoverRadius:3},
      {label:'East',data:east,backgroundColor:'rgba(255,106,89,.75)',borderColor:'#FF6A59',borderWidth:1.5,fill:'-1',tension:0,pointRadius:0,pointHoverRadius:3},
      {label:'South',data:south,backgroundColor:'rgba(127,209,105,.75)',borderColor:'#7FD169',borderWidth:1.5,fill:'-1',tension:0,pointRadius:0,pointHoverRadius:3},
      {label:'West',data:west,backgroundColor:'rgba(255,180,51,.75)',borderColor:'#FFB433',borderWidth:1.5,fill:'-1',tension:0,pointRadius:0,pointHoverRadius:3},
    ]
  },
  options:{
    responsive:true,maintainAspectRatio:false,
    interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:false},tooltip:{
      backgroundColor:'#313d4f',titleFont:{size:10,family:fontFamily},bodyFont:{size:10,family:fontFamily},
      cornerRadius:4,padding:8,boxPadding:3
    }},
    scales:{
      x:{stacked:true,grid:{color:gridColor,drawTicks:false},ticks:{font:tickFont,color:tickColor,maxTicksLimit:9,padding:6},border:{display:false}},
      y:{stacked:true,min:0,grid:{color:gridColor,drawTicks:false},ticks:{font:tickFont,color:tickColor,padding:6,callback:v=>v>=1000?(v/1000)+'K':v},border:{display:false}}
    }
  }
});

// ─── LEGEND INTERACTION ───
document.querySelectorAll('.legend').forEach(legend => {
  const card = legend.closest('.card');
  if (!card) return;
  const canvas = card.querySelector('canvas');
  if (!canvas) return;
  const chartInstance = Chart.getChart(canvas);
  if (!chartInstance) return;

  const items = legend.querySelectorAll('.legend-item');
  const originalBgColors = chartInstance.data.datasets.map(ds => ds.backgroundColor);
  const originalBorderColors = chartInstance.data.datasets.map(ds => ds.borderColor);
  const originalFills = chartInstance.data.datasets.map(ds => ds.fill);
  const isStacked = chartInstance.options.scales?.y?.stacked;

  function recalcFills(visibleSet) {
    const datasets = chartInstance.data.datasets;
    let prevVisible = -1;
    datasets.forEach((ds, i) => {
      if (visibleSet === null) {
        if (isStacked) ds.fill = originalFills[i];
        ds.hidden = false;
      } else if (visibleSet.has(i)) {
        if (isStacked) { ds.fill = prevVisible === -1 ? 'origin' : String(prevVisible); }
        ds.hidden = false;
        prevVisible = i;
      } else {
        if (isStacked) ds.fill = false;
        ds.hidden = true;
      }
    });
  }

  function setOpacity(color, opacity) {
    if (color.startsWith('rgba')) return color.replace(/,\s*[\d.]+\)/, ', ' + opacity + ')');
    if (color.startsWith('rgb(')) {
      const m = color.match(/rgb\(\s*(\d+),\s*(\d+),\s*(\d+)\)/);
      if (m) return `rgba(${m[1]},${m[2]},${m[3]},${opacity})`;
    }
    if (color.startsWith('#')) {
      const r = parseInt(color.slice(1,3),16), g = parseInt(color.slice(3,5),16), b = parseInt(color.slice(5,7),16);
      return `rgba(${r},${g},${b},${opacity})`;
    }
    return color;
  }

  // Compare hint
  let hintShown = false;
  const hintEl = document.createElement('div');
  hintEl.className = 'compare-hint';
  hintEl.innerHTML = '<div class="compare-hint__title">Хотите сравнить графики?</div><div class="compare-hint__desc">Удерживайте Cmd/Ctrl и кликайте по нужным элементам легенды</div><button class="compare-hint__btn">Спасибо, попробую</button>';
  legend.style.position = 'relative';
  legend.appendChild(hintEl);
  hintEl.querySelector('.compare-hint__btn').addEventListener('click', () => { hintEl.classList.remove('visible'); });

  function maybeShowHint(clickedItem) {
    if (hintShown || cmdUsed) return;
    hintShown = true;
    const legendRect = legend.getBoundingClientRect();
    const itemRect = clickedItem.getBoundingClientRect();
    const itemCenterX = itemRect.left + itemRect.width / 2 - legendRect.left;
    const hintWidth = 282;
    const minArrow = 24, maxArrow = hintWidth - 24;
    let hintLeft = itemCenterX - hintWidth / 2;
    if (hintLeft < 0) hintLeft = 0;
    if (hintLeft + hintWidth > legendRect.width) hintLeft = legendRect.width - hintWidth;
    let arrowPos = Math.max(minArrow, Math.min(maxArrow, itemCenterX - hintLeft));
    hintEl.style.left = hintLeft + 'px';
    hintEl.style.setProperty('--arrow-left', arrowPos + 'px');
    hintEl.classList.add('visible');
  }

  const dotColors = ['#3D97F2', '#FF6A59', '#7FD169', '#FFB433'];

  let selectedIdx = -1;
  const selectedSet = new Set();
  let emptySelection = false;
  let hoveredIdx = -1;
  let leaveTimer = null;
  let fadeAnim = null;

  function parseColor(c) {
    if (c.startsWith('rgba')) { const m = c.match(/rgba\(\s*(\d+),\s*(\d+),\s*(\d+),\s*([\d.]+)\)/); return m ? [+m[1],+m[2],+m[3],+m[4]] : [0,0,0,1]; }
    if (c.startsWith('rgb')) { const m = c.match(/rgb\(\s*(\d+),\s*(\d+),\s*(\d+)\)/); return m ? [+m[1],+m[2],+m[3],1] : [0,0,0,1]; }
    if (c.startsWith('#')) { return [parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16),1]; }
    return [0,0,0,1];
  }
  function lerpColor(from, to, t) {
    const f = parseColor(from), tt = parseColor(to);
    const r = Math.round(f[0]+(tt[0]-f[0])*t), g = Math.round(f[1]+(tt[1]-f[1])*t), b = Math.round(f[2]+(tt[2]-f[2])*t), a = f[3]+(tt[3]-f[3])*t;
    return `rgba(${r},${g},${b},${a})`;
  }
  function lerp(a, b, t) { return a + (b - a) * t; }

  // General animated transition: snapshot -> target over duration ms
  function animateTransition(targetState, duration, fillsArg) {
    if (fadeAnim) { cancelAnimationFrame(fadeAnim); fadeAnim = null; }
    // Snapshot
    const fromBg = chartInstance.data.datasets.map(ds => ds.backgroundColor);
    const fromBorder = chartInstance.data.datasets.map(ds => ds.borderColor);
    const fromWidth = chartInstance.data.datasets.map(ds => ds.borderWidth);
    const fromDots = [];
    items.forEach((it, i) => { const d = it.querySelector('.legend-dot'); fromDots.push(d ? d.style.backgroundColor || dotColors[i] : dotColors[i]); });
    // Apply fills/hidden immediately so scale recalculates
    if (fillsArg !== undefined) recalcFills(fillsArg);
    // Set text colors immediately (instant)
    targetState.textColors.forEach((c, i) => { items[i].style.color = c; });

    if (duration === 0) {
      // Instant
      chartInstance.data.datasets.forEach((ds, i) => {
        ds.backgroundColor = targetState.bg[i]; ds.borderColor = targetState.border[i]; ds.borderWidth = targetState.width[i];
      });
      chartInstance.update('none');
      items.forEach((it, i) => { const d = it.querySelector('.legend-dot'); if (d) d.style.backgroundColor = targetState.dots[i]; });
      return;
    }

    const start = performance.now();
    function step(now) {
      let t = Math.min((now - start) / duration, 1);
      t = 1 - Math.pow(1 - t, 3); // easeOutCubic
      chartInstance.data.datasets.forEach((ds, i) => {
        ds.backgroundColor = lerpColor(fromBg[i], targetState.bg[i], t);
        ds.borderColor = lerpColor(fromBorder[i], targetState.border[i], t);
        ds.borderWidth = lerp(fromWidth[i], targetState.width[i], t);
      });
      chartInstance.update('none');
      items.forEach((it, i) => { const d = it.querySelector('.legend-dot'); if (d) d.style.backgroundColor = lerpColor(fromDots[i], targetState.dots[i], t); });
      if (t < 1) fadeAnim = requestAnimationFrame(step);
      else fadeAnim = null;
    }
    fadeAnim = requestAnimationFrame(step);
  }

  function applyHoverState(hIdx) {
    hoveredIdx = hIdx;
    const bg = [], border = [], width = [], dots = [], text = [];
    originalBgColors.forEach((c, i) => {
      if (i === hIdx) { bg.push(c); border.push(originalBorderColors[i]); width.push(4); dots.push(dotColors[i]); text.push('rgba(0,0,0,.7)'); }
      else { bg.push(setOpacity(c, 0.15)); border.push(setOpacity(originalBorderColors[i], 0.3)); width.push(1); dots.push(setOpacity(dotColors[i], 0.3)); text.push('rgba(0,0,0,.3)'); }
    });
    animateTransition({bg, border, width, dots, textColors: text}, 300, null);
  }

  function clearHoverState() {
    hoveredIdx = -1;
    const bg = originalBgColors.slice();
    const border = originalBorderColors.slice();
    const width = bg.map(() => 1.5);
    const dots = dotColors.slice();
    const text = dotColors.map(() => '');
    animateTransition({bg, border, width, dots, textColors: text}, 700, null);
  }

  function isSelected(i) { if (selectedSet.size > 0) return selectedSet.has(i); if (selectedIdx >= 0) return i === selectedIdx; return false; }
  function hasSelection() { return selectedIdx >= 0 || selectedSet.size > 0 || emptySelection; }

  function applySelected(duration) {
    const dur = duration !== undefined ? duration : 300;
    const bg = [], border = [], width = [], dots = [], text = [];
    let vis = null;
    if (hasSelection()) {
      vis = new Set();
      originalBgColors.forEach((c, i) => {
        if (isSelected(i)) { bg.push(c); border.push(originalBorderColors[i]); width.push(2); dots.push(dotColors[i]); text.push('rgba(0,0,0,.5)'); vis.add(i); }
        else { bg.push(setOpacity(c, 0)); border.push(setOpacity(originalBorderColors[i], 0)); width.push(0); dots.push('rgba(0,0,0,.15)'); text.push('rgba(0,0,0,.3)'); }
      });
    } else {
      originalBgColors.forEach((c, i) => { bg.push(c); border.push(originalBorderColors[i]); width.push(1.5); dots.push(dotColors[i]); text.push(''); });
    }
    animateTransition({bg, border, width, dots, textColors: text}, dur, vis);
  }

  let cmdDown = false;
  let cmdUsed = false;
  let currentHoverIdx = -1;
  let clickLocked = false;
  document.addEventListener('keydown', e => { if (e.metaKey || e.ctrlKey) { cmdDown = true; cmdUsed = true; hintEl.classList.remove('visible'); if (!clickLocked) reapplyHover(); }});
  document.addEventListener('keyup', e => { if (!e.metaKey && !e.ctrlKey) { cmdDown = false; if (!clickLocked) reapplyHover(); }});

  function reapplyHover() {
    if (currentHoverIdx < 0) return;
    const idx = currentHoverIdx;
    const item = items[idx];
    if (!item) return;
    if (cmdDown) {
      if (hasSelection()) { if (isSelected(idx)) applyInverseHover(idx); else applySelectedHoverNormal(idx); }
      else applyInverseHover(idx);
    } else {
      if (hasSelection()) {
        if (emptySelection) {
          const bg=[],br=[],w=[],d=[],t=[];
          const vis=new Set([idx]);
          originalBgColors.forEach((c,i)=>{
            if(i===idx){bg.push(c);br.push(originalBorderColors[i]);w.push(2);d.push(dotColors[i]);t.push('rgba(0,0,0,.7)');}
            else{bg.push(setOpacity(c,0));br.push(setOpacity(originalBorderColors[i],0));w.push(0);d.push('rgba(0,0,0,.15)');t.push('rgba(0,0,0,.3)');}
          });
          animateTransition({bg,border:br,width:w,dots:d,textColors:t},0,vis);
        } else if (isSelected(idx)) { applySelected(0); item.style.color='rgba(0,0,0,.7)'; }
        else {
          const bg=[],br=[],w=[],d=[],t=[];
          const vis=new Set();
          originalBgColors.forEach((c,i)=>{
            if(isSelected(i)){bg.push(c);br.push(originalBorderColors[i]);w.push(2);d.push(dotColors[i]);t.push('rgba(0,0,0,.5)');vis.add(i);}
            else if(i===idx){bg.push(setOpacity(c,0.3));br.push(setOpacity(originalBorderColors[i],0.5));w.push(1.5);d.push(setOpacity(dotColors[idx],0.4));t.push('rgba(0,0,0,.4)');vis.add(i);}
            else{bg.push(setOpacity(c,0));br.push(setOpacity(originalBorderColors[i],0));w.push(0);d.push('rgba(0,0,0,.15)');t.push('rgba(0,0,0,.3)');}
          });
          animateTransition({bg,border:br,width:w,dots:d,textColors:t},0,vis);
        }
      } else applyHoverState(idx);
    }
  }

  function applyInverseHover(hIdx) {
    const bg=[],br=[],w=[],d=[],t=[];
    if (hasSelection()) {
      const vis=new Set();
      originalBgColors.forEach((c,i)=>{
        if(isSelected(i)&&i!==hIdx){bg.push(c);br.push(originalBorderColors[i]);w.push(2);d.push(dotColors[i]);t.push('rgba(0,0,0,.5)');vis.add(i);}
        else if(i===hIdx){bg.push(setOpacity(c,0));br.push(setOpacity(originalBorderColors[i],0));w.push(0);d.push(setOpacity(dotColors[i],0.3));t.push('rgba(0,0,0,.3)');}
        else{bg.push(setOpacity(c,0));br.push(setOpacity(originalBorderColors[i],0));w.push(0);d.push('rgba(0,0,0,.15)');t.push('rgba(0,0,0,.3)');}
      });
      animateTransition({bg,border:br,width:w,dots:d,textColors:t},0,vis);
    } else {
      originalBgColors.forEach((c,i)=>{
        if(i===hIdx){bg.push(setOpacity(c,0.15));br.push(setOpacity(originalBorderColors[i],0.3));w.push(1);d.push(setOpacity(dotColors[i],0.3));t.push('rgba(0,0,0,.3)');}
        else{bg.push(c);br.push(originalBorderColors[i]);w.push(1.5);d.push(dotColors[i]);t.push('rgba(0,0,0,.7)');}
      });
      animateTransition({bg,border:br,width:w,dots:d,textColors:t},0,null);
    }
  }

  function applySelectedHoverNormal(hIdx) {
    const bg=[],br=[],w=[],d=[],t=[];
    const vis=new Set();
    originalBgColors.forEach((c,i)=>{
      if(isSelected(i)||i===hIdx){bg.push(c);br.push(originalBorderColors[i]);w.push(2);d.push(dotColors[i]);vis.add(i);
        t.push(i===hIdx?'rgba(0,0,0,.7)':'rgba(0,0,0,.5)');}
      else{bg.push(setOpacity(c,0));br.push(setOpacity(originalBorderColors[i],0));w.push(0);d.push('rgba(0,0,0,.15)');t.push('rgba(0,0,0,.3)');}
    });
    animateTransition({bg,border:br,width:w,dots:d,textColors:t},0,vis);
  }

  items.forEach((item, idx) => {
    item.addEventListener('mouseenter', () => {
      clearTimeout(leaveTimer);
      currentHoverIdx = idx;
      hoveredIdx = idx;

      if (cmdDown) {
        if (hasSelection()) { if (isSelected(idx)) applyInverseHover(idx); else applySelectedHoverNormal(idx); }
        else applyInverseHover(idx);
        return;
      }
      if (hasSelection()) {
        if (emptySelection) {
          // Show only hovered
          const bg1=[], br1=[], w1=[], d1=[], t1=[];
          const vis1 = new Set([idx]);
          originalBgColors.forEach((c,i) => {
            if (i===idx) { bg1.push(c); br1.push(originalBorderColors[i]); w1.push(2); d1.push(dotColors[i]); t1.push('rgba(0,0,0,.7)'); }
            else { bg1.push(setOpacity(c,0)); br1.push(setOpacity(originalBorderColors[i],0)); w1.push(0); d1.push('rgba(0,0,0,.15)'); t1.push('rgba(0,0,0,.3)'); }
          });
          animateTransition({bg:bg1,border:br1,width:w1,dots:d1,textColors:t1}, 0, vis1);
        } else if (isSelected(idx)) {
          // Hovering on selected: restore selected state, brighten text
          applySelected(0);
          item.style.color = 'rgba(0,0,0,.7)';
        } else {
          // Inverse: selected stays full, hovered shows dimmed preview
          const bg2=[], br2=[], w2=[], d2=[], t2=[];
          const vis2 = new Set();
          originalBgColors.forEach((c,i) => {
            if (isSelected(i)) { bg2.push(c); br2.push(originalBorderColors[i]); w2.push(2); d2.push(dotColors[i]); t2.push('rgba(0,0,0,.5)'); vis2.add(i); }
            else if (i===idx) { bg2.push(setOpacity(c,0.3)); br2.push(setOpacity(originalBorderColors[i],0.5)); w2.push(1.5); d2.push(setOpacity(dotColors[i],0.4)); t2.push('rgba(0,0,0,.4)'); vis2.add(i); }
            else { bg2.push(setOpacity(c,0)); br2.push(setOpacity(originalBorderColors[i],0)); w2.push(0); d2.push('rgba(0,0,0,.15)'); t2.push('rgba(0,0,0,.3)'); }
          });
          animateTransition({bg:bg2,border:br2,width:w2,dots:d2,textColors:t2}, 0, vis2);
        }
        return;
      }
      applyHoverState(idx);
    });

    item.addEventListener('mouseleave', () => {
      currentHoverIdx = -1; clickLocked = false;
      leaveTimer = setTimeout(() => {
        if (currentHoverIdx >= 0) return;
        hoveredIdx = -1;
        if (hasSelection()) {
          applySelected(0);
        } else {
          clearHoverState();
        }
      }, 80);
    });

    item.addEventListener('click', (e) => {
      clearTimeout(leaveTimer);
      clickLocked = true;

      if (e.metaKey || e.ctrlKey) {
        if (!hasSelection()) {
          emptySelection = false; selectedSet.clear(); selectedIdx = -1;
          items.forEach((_, i) => { if (i !== idx) selectedSet.add(i); });
          if (selectedSet.size === 1) { selectedIdx = [...selectedSet][0]; selectedSet.clear(); }
        } else if (emptySelection) { emptySelection = false; selectedIdx = idx; }
        else {
          if (selectedIdx >= 0 && selectedSet.size === 0) { selectedSet.add(selectedIdx); selectedIdx = -1; }
          if (selectedSet.has(idx)) selectedSet.delete(idx); else selectedSet.add(idx);
          if (selectedSet.size === items.length) { selectedSet.clear(); selectedIdx = -1; emptySelection = false; }
          else if (selectedSet.size === 1) { selectedIdx = [...selectedSet][0]; selectedSet.clear(); emptySelection = false; }
          else if (selectedSet.size === 0) { selectedIdx = -1; emptySelection = true; }
        }
      } else {
        const hadSelection = selectedIdx >= 0;
        const prevIdx = selectedIdx;
        selectedSet.clear(); emptySelection = false;
        if (selectedIdx === idx) selectedIdx = -1; else selectedIdx = idx;
        if (hadSelection && prevIdx !== idx && selectedIdx >= 0) maybeShowHint(item);
      }

      applySelected();
    });
  });
});
</script>
</body>
</html>
